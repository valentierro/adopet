<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adopet API - Swagger</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
</head>
<body>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      let defaultUrl;
      if (params.get('url')) {
        defaultUrl = params.get('url');
      } else if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
        defaultUrl = 'http://localhost:3000/api/docs-json';
      } else {
        // GitHub Pages / produção: spec estático (evita mixed-content e localhost inacessível)
        defaultUrl = './openapi.json';
      }
      const url = defaultUrl;
      const ui = SwaggerUIBundle({
        url: url,
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIBundle.SwaggerUIStandalonePreset
        ],
        layout: 'BaseLayout',
        persistAuthorization: true
      });
      window.ui = ui;
    })();
  </script>
</body>
</html>
